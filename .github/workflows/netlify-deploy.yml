# Deploys the static site to Netlify on every push to `main` or `master`.
#
# Setup (one-time):
# 1) Netlify: Site settings → General → Site details → copy "Site ID"
# 2) Netlify: User settings → Applications → Personal access tokens → create token
# 3) GitHub repo: Settings → Secrets and variables → Actions → add:
#    - NETLIFY_AUTH_TOKEN
#    - NETLIFY_SITE_ID
#
# Alternative (no GitHub Actions): connect the repo in Netlify UI and leave
# build command empty with publish directory "." — this workflow is optional.

name: Deploy to Netlify

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: netlify-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check Netlify secrets
        id: secrets_check
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "${NETLIFY_AUTH_TOKEN:-}" ] || [ -z "${NETLIFY_SITE_ID:-}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Netlify secrets are missing. Skipping CLI deploy; Netlify Git integration can still auto-publish."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy (production)
        if: steps.secrets_check.outputs.enabled == 'true'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          set -euo pipefail
          npx --yes netlify-cli deploy --prod --dir .
